      heading: "%{first_name}, estas parcelas precisam de atencao"
      summary:
        one: "Existe 1 parcela em aberto entre atrasadas, hoje e amanha, totalizando %{amount}."
        other: "Existem %{count} parcelas em aberto entre atrasadas, hoje e amanha, totalizando %{amount}."
      installment_count: "Parcela %{number}/%{count}"
      empty_section: "Nada por aqui."
