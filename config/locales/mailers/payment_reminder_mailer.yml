en:
  payment_reminder_mailer:
    daily_digest:
      subject: "30/Fev payment reminder - %{date}"
      preview_title: "Your 30/Fev payment reminder"
      kicker: "Payment control"
      heading: "%{first_name}, these installments need attention"
      summary:
        one: "There is 1 unpaid installment across overdue, today, and tomorrow, totaling %{amount}."
        other: "There are %{count} unpaid installments across overdue, today, and tomorrow, totaling %{amount}."
      installment_count: "Installment %{number}/%{count}"
      empty_section: "Nothing here."
      footer_note: "This reminder was generated automatically by 30/Fev to help you keep your payment schedule under control."
      sections:
        overdue:
          title: "High Alert: overdue"
          subtitle: "Unpaid installments before today. These should be reviewed first."
        due_today:
          title: "Warning: due today"
          subtitle: "Installments scheduled for today."
        due_tomorrow:
          title: "Warning: due tomorrow"
          subtitle: "Installments coming next, so you can prepare before they become overdue."

pt-BR:
  payment_reminder_mailer:
