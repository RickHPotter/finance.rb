en:
  activerecord:
    models:
      message:
        one: Message
        other: Messages
    attributes:
      message:
        id: ID
        body_placeholder: Type your message
        hello: Hello
        ivemadeatransactiononyou: I made a transaction referencing you.
        iveupdatedatransactiononyou: I updated a transaction referencing you.
        ivedeletedatransactiononyou: I deleted a transaction referencing you.
        ivepaidayoursharedtransaction: I marked your shared transaction as paid.
        iveunpaidayoursharedtransaction: I marked your shared transaction as not paid.
        click_down_below: Click down below to match this transaction on your app.
        click_down_below_theirs: Click down below to match this transaction on your app.
        click_down_below_mine: Click down below to see this transaction on your side.
        you_have_a_new_message: You have a new message
        outdated_message: Outdated message! Click to see the updated version.
        already_deleted: This transaction was already deleted.
        already_created: This transaction was already created.
        already_updated: This transaction was already updated.
        already_destroyed: This transaction was already destroyed.
        already_acknowledged: This notification was already acknowledged.
        create: Create
        edit: Edit
        correct: Correct
        destroy: Destroy
        ok: Ok
        assistant_actor: "On behalf of %{name}"
        notification_actions:
          create: Created transaction
          update: Updated transaction
          destroy: Deleted transaction
          paid: Marked paid
          unpaid: Marked not paid

pt-BR:
  activerecord:
    models:
      message:
        one: Mensagem
        other: Mensagens
    attributes:
      message:
        id: ID
        body_placeholder: Digite sua mensagem
        hello: Olá
        ivemadeatransactiononyou: Eu fiz uma transação referenciando você.
        iveupdatedatransactiononyou: Eu atualizei uma transação referenciando você.
        ivedeletedatransactiononyou: Eu excluí uma transação referenciando você.
        ivepaidayoursharedtransaction: Eu marquei sua transação compartilhada como paga.
        iveunpaidayoursharedtransaction: Eu marquei sua transação compartilhada como pendente.
        click_down_below: Clique abaixo para vincular essa transação ao seu app.
        click_down_below_theirs: Clique abaixo para vincular essa transação ao seu app.
        click_down_below_mine: Clique abaixo para ver essa transação do seu lado.
        you_have_a_new_message: Vocês tem uma nova mensagem
        outdated_message: Mensagem desatualizada! Clique para ver a versão atualizada.
        already_deleted: Essa transação já foi excluída.
        already_created: Essa transação já foi criada.
        already_updated: Essa transação já foi atualizada.
        already_destroyed: Essa transação já foi excluída.
        already_acknowledged: Essa notificação já foi confirmada.
        create: Criar
        edit: Editar
        correct: Corrigir
        destroy: Excluir
        ok: Ok
        assistant_actor: "Em nome de %{name}"
        notification_actions:
          create: Transação criada
          update: Transação atualizada
          destroy: Transação excluída
          paid: Marcada como paga
          unpaid: Marcada como pendente
