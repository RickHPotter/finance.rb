      allocation_locked_after_payment: "Mantenha a parte já paga intacta. Se a alocação futura mudou, crie uma nova transação apenas para o trecho futuro com as novas categorias ou entidades."
      paid_history_locked:
        default: "Mantenha a parte já paga intacta. Edite somente parcelas futuras e pendentes após a última data paga, ou crie uma movimentação compensatória para corrigir o histórico."
        cash_transaction: "Mantenha a parte já paga intacta. Se isto for uma reversão no mês atual ou uma correção de lançamento tardio na virada do mês, use o fluxo de confirmação mostrado pelo app; caso contrário, edite apenas parcelas futuras pendentes ou crie uma movimentação compensatória."
        cash_installment: "Mantenha a parte já paga intacta. Se isto for uma reversão no mês atual ou uma correção de lançamento tardio na virada do mês, use o fluxo de confirmação mostrado pelo app; caso contrário, edite apenas parcelas futuras pendentes ou crie uma movimentação compensatória."
        card_transaction: "Mantenha o histórico já faturado intacto. Se isto for apenas uma correção de data dentro do mesmo ref mês/ano, use o fluxo de confirmação mostrado pelo app; caso contrário, mantenha o ciclo e crie uma movimentação compensatória."
        card_installment: "Mantenha o histórico já faturado intacto. Se isto for apenas uma correção de data dentro do mesmo ref mês/ano, use o fluxo de confirmação mostrado pelo app; caso contrário, mantenha o ciclo e crie uma movimentação compensatória."
      destroy_locked_after_payment: "Não apague histórico já liquidado. Mantenha o registro existente e crie uma movimentação compensatória ou de estorno."
      counterpart_paid_state_sync_missing: "Abra ou crie primeiro a devolução compartilhada correspondente do outro usuário e tente mudar o estado pago novamente."
      same_cycle_history_correction_confirmation_required:
        card_transaction: "Revise a correção e use o botão de confirmação abaixo se quiser manter a transação paga dentro do mesmo ref mês/ano."
        card_installment: "Revise a correção e use o botão de confirmação abaixo se quiser manter a parcela paga dentro do mesmo ref mês/ano."
      exchange_return_price_correction_confirmation_required:
        cash_transaction: "Revise a correção de preço da devolução de troca já paga e use o botão de confirmação abaixo se quiser manter as trocas espelhadas e a devolução da contraparte alinhadas com esse novo valor."
        cash_installment: "Revise a correção de preço da parcela paga da devolução de troca e use o botão de confirmação abaixo se quiser manter as trocas espelhadas e a devolução da contraparte alinhadas com esse novo valor."
      paid_amount_correction_confirmation_required:
        cash_transaction: "Revise a correção de valor e use o botão de confirmação abaixo se esta transação e seu histórico já pago realmente precisarem desse novo valor."
        cash_installment: "Revise a correção de valor da parcela paga e use o botão de confirmação abaixo se este histórico em dinheiro realmente precisar desse novo valor."
        card_transaction: "Revise a correção de valor e use o botão de confirmação abaixo se este histórico já faturado realmente precisar desse novo valor."
        card_installment: "Revise a correção de valor da parcela paga e use o botão de confirmação abaixo se este histórico de cartão realmente precisar desse novo valor."
      same_month_paid_state_correction_confirmation_required:
        cash_transaction: "Revise a reversão no mês atual e use o botão de confirmação abaixo se esta movimentação paga realmente precisar voltar a não paga."
        cash_installment: "Revise a reversão no mês atual e use o botão de confirmação abaixo se esta parcela paga realmente precisar voltar a não paga."
      month_boundary_history_correction_confirmation_required:
        cash_transaction: "Revise a correção de lançamento tardio e use o botão de confirmação abaixo se esta movimentação paga realmente precisar mudar entre períodos mensais adjacentes."
        cash_installment: "Revise a correção de lançamento tardio e use o botão de confirmação abaixo se esta parcela paga realmente precisar mudar entre períodos mensais adjacentes."
