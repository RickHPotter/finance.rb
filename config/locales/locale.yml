        card_installment: "Mantenha o histórico já faturado intacto. Se isto for apenas uma correção de data dentro do mesmo ref mês/ano, use o fluxo de confirmação mostrado pelo app; caso contrário, mantenha o ciclo e crie uma movimentação compensatória."
