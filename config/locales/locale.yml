    cancel: "Cancelar"
  notification:
    created: "%{model} foi criado com sucesso."
    not_created: "%{model} não foi criado."
    updated: "%{model} foi atualizado com sucesso."
    not_updated: "%{model} não foi atualizado."
    destroyed: "%{model} foi excluído com sucesso."
    not_destroyed: "%{model} não foi excluído."
    createda: "%{model} foi criada com sucesso."
    not_createda: "%{model} não foi criada."
