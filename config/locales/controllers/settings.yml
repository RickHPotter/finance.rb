        missing_moi_allocation: "Missing MOI allocation for the self-share"
        entity_allocation_mismatch: "Entity allocation does not match the transaction total"
    card_exchange_projection_audit:
      loading: "Loading card projection audit..."
      title: "Card Projection Audit"
      description: "Review card transactions whose payer exchange rows no longer match the source installment month/year and amount projection."
