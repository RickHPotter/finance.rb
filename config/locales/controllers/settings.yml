        title: "Choose sender exchange return"
        description: "This chain has more than one sender-side EXCHANGE RETURN option. Choose the correct parent to update the expected rewrites."
        submit: "Use this option"
      receiver_selection:
        title: "Choose receiver local transaction"
        description: "The audit could not localize the receiver-side shared return automatically. Choose the correct local transaction to update the expected rewrites."
        submit: "Use this option"
      "yes": "Yes"
      "no": "No"
      filters:
        pending: "Pending"
        done: "Done"
      chain_kinds:
        shared_return_chain: "Shared Return Chain"
        loan_chain: "Loan Chain"
      reference_statuses:
        ok: "Reference OK"
        missing: "Reference Missing"
        mismatch: "Reference Mismatch"
