      empty: "No exchange audit rows were found."
      source: "Source"
      middle: "Middle"
      end: "End"
      sender: "Sender"
      receiver: "Receiver"
      scenario: "Scenario"
      main: "Main"
      intent: "Intent"
      action: "Action"
      actionable: "Actionable"
      apply_button: "Apply changes"
      apply_unavailable: "Apply unavailable: %{reason}"
      apply_result:
        updated:
          one: "Applied 1 exchange audit row."
          other: "Applied %{count} exchange audit rows."
        skipped: "No exchange audit rows were applied."
      issues: "Issues"
      date: "Date"
      price: "Price"
      context: "Context"
      categories: "Categories"
      entities: "Entities"
      missing: "Missing"
      current_reference: "Current Reference"
