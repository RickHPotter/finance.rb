      open: "Open"
      date: "Date"
      context: "Context"
      status_label: "Status"
      month_year: "Month / Year"
      bucket: "Bucket"
      installment_number: "Installment"
      expected_rows: "Expected Projection Rows"
      actual_rows: "Actual Exchange Rows"
      filters:
        pending: "Pending"
        paid: "Paid"
      summary:
        rows: "Rows"
        shape_mismatches: "Shape Mismatches"
        duplicate_buckets: "Duplicate Buckets"
      metrics:
        card_total: "Card Total"
        expected_total: "Expected Total"
        actual_total: "Actual Total"
      allocation_rows:
        title: "Source Allocation Issues"
        description: "These card transactions have entity splits that do not reconcile with the transaction total."
        transaction_total: "Transaction Total"
        allocation_total: "Allocation Total"
        missing_amount: "Missing Amount"
      issue_codes:
        payer_exchange_total_mismatch: "Payer exchanges differ from declared payer total"
