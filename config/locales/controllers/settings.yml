pt-BR:
  settings:
    title: "Ajustes"
    description: "Execute rotinas de manutenção e revise auditorias administrativas em um só lugar."
    tabs:
      naming: "Naming Service"
      exchange_audit: "Auditoria de Trocas"
    exchange_audit:
      loading: "Carregando auditoria de trocas..."
      title: "Auditoria de Trocas"
      description: "Cada linha abaixo começa na mensagem mais recente do assistente ligada a um fluxo de troca entre usuários vinculados e compara a cadeia atual de referências com a cadeia canônica de pais."
      empty: "Nenhuma linha de auditoria de trocas foi encontrada."
      source: "Origem"
      middle: "Meio"
      end: "Fim"
      sender: "Remetente"
      receiver: "Destinatário"
      scenario: "Cenário"
      main: "Principal"
      intent: "Intenção"
      action: "Ação"
      actionable: "Acionável"
      apply_button: "Aplicar linha"
      apply_unavailable: "Aplicação indisponível: %{reason}"
      apply_result:
        updated:
          one: "1 linha da auditoria de trocas foi aplicada."
          other: "%{count} linhas da auditoria de trocas foram aplicadas."
        skipped: "Nenhuma linha da auditoria de trocas foi aplicada."
      issues: "Problemas"
      date: "Data"
      price: "Preço"
      context: "Contexto"
      categories: "Categorias"
      entities: "Entidades"
      missing: "Ausente"
      current_reference: "Referência Atual"
      expected_reference: "Referência Esperada"
      no_reference: "Sem referência"
      proposed_changes: "Mudanças propostas"
      candidates_count: "candidatos: %{count}"
      middle_selection:
        title: "Escolher retorno da troca do remetente"
        description: "Esta cadeia tem mais de um candidato de EXCHANGE RETURN no remetente. Escolha o pai correto para atualizar as mudanças esperadas."
        submit: "Usar este candidato"
      receiver_selection:
        title: "Escolher transação local do destinatário"
        description: "A auditoria não conseguiu localizar automaticamente o retorno compartilhado no destinatário. Escolha a transação local correta para atualizar as mudanças esperadas."
        submit: "Usar esta transação"
      "yes": "Sim"
      "no": "Não"
      filters:
        pending: "Pendentes"
        done: "Concluídos"
      chain_kinds:
        shared_return_chain: "Cadeia de Retorno Compartilhado"
        loan_chain: "Cadeia de Empréstimo"
      reference_statuses:
        ok: "Referência OK"
        missing: "Referência Ausente"
        mismatch: "Referência Divergente"
        unexpected: "Referência Deve Ficar Vazia"
      node_labels:
        source: "Origem"
        middle: "Meio"
        middle_candidate: "Candidato do Meio"
        receiver_candidate: "Candidato do Destinatário"
        receiver_shared_return: "Retorno Compartilhado do Destinatário"
        receiver_exchange: "Troca do Destinatário"
        receiver_exchange_return: "Retorno da Troca do Destinatário"
      change_actions:
        set_reference: "%{node}: ajustar a referência de %{transaction} de %{from} para %{to}"
        clear_reference: "%{node}: limpar a referência de %{transaction} que hoje aponta para %{from}"
      issue_codes:
        multiple_middle_candidates: "Há múltiplos candidatos de retorno da troca no remetente"
        missing_middle: "Falta o retorno da troca do remetente"
        missing_receiver_reference: "Falta a transação local do destinatário"
        missing_receiver_exchange_return: "Falta o retorno da troca do destinatário"
        source_reference_should_be_blank: "A transação de origem não deveria referenciar outra transação"
        middle_reference_missing: "O retorno da troca do remetente está sem referência para a origem"
        middle_reference_mismatch: "O retorno da troca do remetente aponta para o pai errado"
        middle_candidate_reference_missing: "Um candidato de retorno da troca no remetente está sem referência para a origem"
        middle_candidate_reference_mismatch: "Um candidato de retorno da troca no remetente aponta para o pai errado"
        middle_candidate_reference_should_be_blank: "Um candidato de retorno da troca no remetente não deveria apontar para outra transação"
        receiver_shared_return_reference_missing: "O BORROW RETURN do destinatário está sem referência para o retorno da troca do remetente"
        receiver_shared_return_reference_mismatch: "O BORROW RETURN do destinatário aponta para o pai errado"
        receiver_exchange_reference_missing: "A troca do destinatário está sem referência para o retorno da troca do remetente"
        receiver_exchange_reference_mismatch: "A troca do destinatário aponta para o pai errado"
        receiver_exchange_return_reference_missing: "O retorno da troca do destinatário está sem referência para a troca do destinatário"
        receiver_exchange_return_reference_mismatch: "O retorno da troca do destinatário aponta para o pai errado"
        receiver_exchange_return_reference_should_be_blank: "O retorno da troca do destinatário não deveria apontar para um pai diferente"
      receiver_exchange: "Troca do Destinatário"
      receiver_exchange_return: "Retorno da Troca do Destinatário"
      shared_return: "Retorno Compartilhado"
      message: "Mensagem"
